app-id: io.github.diegoachury.CaffeineCosmic
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-caffeine

finish-args:
  # Inhibición de inactividad (cosmic-idle implementa esta interfaz).
  - --talk-name=org.freedesktop.ScreenSaver
  # Registro del icono en la bandeja (StatusNotifierItem).
  - --talk-name=org.kde.StatusNotifierWatcher
  # NOTA: la app llama a `disable_dbus_name(true)` dentro de Flatpak, por lo que
  # NO necesita --own-name. Si durante las pruebas (Fase 3) el icono no apareciera,
  # el último recurso es sustituir los dos --talk-name por: --socket=session-bus

modules:
  # El nombre del módulo DEBE ser "caffeine-cosmic": fija el directorio de build
  # /run/build/caffeine-cosmic, del que depende CARGO_HOME y el vendor de cargo.
  - name: caffeine-cosmic
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/caffeine-cosmic/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - make install PREFIX=/app
    sources:
      - type: git
        url: https://github.com/diegoachury/CaffeineCosmic.git
        tag: v0.1.0
        commit: 1a64ca0a367aca41ac084aa8502668aa2fef5b82
      - cargo-sources.json
